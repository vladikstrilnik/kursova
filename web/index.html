<!DOCTYPE html>
<html lang="uk">

<head>

<meta charset="UTF-8">

<title>Water Control</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<h1>Контроль споживання води</h1>

<div class="card">

<h2>Поточні дані</h2>

<p>Пристрій:
<span id="device">-</span>
</p>

<p>Спожито:
<span id="liters">0</span>
л
</p>

<p>Витрата:
<span id="flow">0</span>
л/год
</p>

<p>Час:
<span id="time">-</span>
</p>

</div>

<div class="card">

<h2>Статистика</h2>

<p>Загальна кількість:

<span id="total">0</span>

л

</p>

<p>Максимальна витрата

<span id="max_flow">0</span>

л/год

</p>

</div>

<script src="script.js"></script>

</body>

</html>
